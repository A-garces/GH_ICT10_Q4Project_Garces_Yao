<div class="container mt-5">
  <h1>Attendance Tracker</h1>

    <form>
        <div class="mb-3">
            <label class="form-label">Day of the Week</label>
            <select id="dayOfTheWeek" class="form-select">
                <option value="Monday">Monday</option>
                <option value="Tuesday">Tuesday</option>
                <option value="Wednesday">Wednesday</option>
                <option value="Thursday">Thursday</option>
                <option value="Friday">Friday</option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Number of Absences</label>
            <input type="number" class="form-control" id="absences" placeholder="Enter number of absences">
        </div>

        <div class="d-grid">
            <input type="button" py-click="displaying" value="Submit" class="btn btn-outline-danger">
        </div>
    </form>
